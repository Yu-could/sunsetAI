<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夕阳智语 · 开发记录 第1期</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;background:#e8e0d8;
  font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
}
.cover{
  width:1080px;height:1920px;
  background:linear-gradient(170deg,#FFF9F4 0%,#FFF3E8 25%,#FDE8D4 50%,#FFF5ED 75%,#FFFAF6 100%);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 20px 80px rgba(0,0,0,.15);
}

/* 柔和光晕 */
.glow-1{
  position:absolute;top:-120px;right:-80px;
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(232,132,60,.12) 0%,transparent 70%);
  border-radius:50%;pointer-events:none;
}
.glow-2{
  position:absolute;bottom:10%;left:-120px;
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(91,155,213,.07) 0%,transparent 70%);
  border-radius:50%;pointer-events:none;
}
.glow-3{
  position:absolute;top:45%;right:20%;
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(232,132,60,.06) 0%,transparent 70%);
  border-radius:50%;pointer-events:none;
}

/* Logo区 */
.logo-area{position:relative;z-index:2;padding:80px 90px 0;}
.logo-row{display:flex;align-items:center;gap:24px;}
.logo-icon{
  width:80px;height:80px;border-radius:20px;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
  overflow:hidden;padding:8px;
}
.logo-icon img{width:100%;height:100%;object-fit:contain;}
.logo-text-col{display:flex;flex-direction:column;}
.logo-name{
  font-size:36px;font-weight:700;color:#2D2D2D;letter-spacing:1px;
}
.logo-sub{
  font-size:18px;color:#909090;font-weight:400;letter-spacing:2px;
  margin-top:2px;
}

/* 中间：手机界面模型 */
.phone-section{
  position:relative;z-index:2;
  flex:1;display:flex;align-items:center;justify-content:center;
  margin-top:50px;
}

/* 淡化桌面背景 */
.desktop-bg{
  position:absolute;top:52%;left:50%;transform:translate(-50%,-50%);
  width:700px;height:420px;
  background:rgba(255,255,255,.5);
  border-radius:24px;
  box-shadow:0 4px 40px rgba(0,0,0,.04);
  opacity:.45;
}
.desktop-bg-inner{
  display:flex;height:100%;border-radius:24px;overflow:hidden;
}
.desktop-sidebar{
  width:180px;background:rgba(255,255,255,.7);
  border-radius:24px 0 0 24px;
  padding:20px 16px;
}
.desktop-sidebar-item{
  height:12px;background:rgba(200,185,170,.4);
  border-radius:6px;margin-bottom:10px;
}
.desktop-sidebar-item.active{
  background:rgba(232,132,60,.4);width:70%;
}
.desktop-sidebar-item:nth-child(2){width:85%}
.desktop-sidebar-item:nth-child(3){width:60%}
.desktop-sidebar-item:nth-child(4){width:75%}
.desktop-sidebar-item:nth-child(5){width:50%}
.desktop-main{
  flex:1;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:12px;
}
.desktop-card{
  background:rgba(255,255,255,.8);
  border-radius:16px;padding:16px;
}
.desktop-card-line{
  height:8px;background:rgba(200,185,170,.3);
  border-radius:4px;margin-bottom:8px;
}
.desktop-card-line:nth-child(2){width:60%}

/* 手机模型 */
.phone-mockup{
  position:relative;z-index:3;
  width:320px;height:640px;
  background:#fff;
  border-radius:40px;
  box-shadow:
    0 20px 60px rgba(0,0,0,.1),
    0 8px 20px rgba(0,0,0,.06),
    inset 0 0 0 3px #2D2D2D;
  padding:12px;
}
.phone-screen{
  width:100%;height:100%;
  background:#FFF9F5;
  border-radius:30px;
  overflow:hidden;
  padding:20px 16px;
  display:flex;flex-direction:column;
}
/* 手机顶部栏 */
.phone-status{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;
}
.phone-time{font-size:14px;font-weight:600;color:#2D2D2D;}
.phone-icons{display:flex;gap:4px;}
.phone-icon-dot{width:6px;height:6px;border-radius:50%;background:#E8843C;}
/* 手机头部卡片 */
.phone-header{
  background:linear-gradient(135deg,#E8843C,#D4732E);
  border-radius:20px;padding:18px 16px;color:#fff;margin-bottom:14px;
  box-shadow:0 8px 24px rgba(232,132,60,.2);
}
.phone-header-row{display:flex;align-items:center;gap:12px;}
.phone-avatar{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;
}
.phone-header-title{font-size:17px;font-weight:700;}
.phone-header-sub{font-size:11px;opacity:.7;margin-top:2px;}
/* 手机功能网格 */
.phone-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;
}
.phone-func{
  background:#fff;border-radius:14px;
  padding:14px 8px;text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.phone-func-icon{
  width:28px;height:28px;border-radius:8px;
  margin:0 auto 6px;
}
.phone-func-icon.health{background:#FDE8E8;}
.phone-func-icon.med{background:#F3E5F5;}
.phone-func-icon.memory{background:#E3F2FD;}
.phone-func-icon.diet{background:#FFF3E0;}
.phone-func-icon.signin{background:#E8F5E9;}
.phone-func-icon.family{background:#FCE4EC;}
.phone-func-label{font-size:11px;color:#5A5A5A;font-weight:500;}
/* 手机紧急横幅 */
.phone-sos{
  background:linear-gradient(135deg,#E74C3C,#C0392B);
  border-radius:16px;padding:14px 16px;
  display:flex;align-items:center;gap:10px;
  margin-bottom:12px;
}
.phone-sos-icon{
  width:32px;height:32px;background:rgba(255,255,255,.2);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
}
.phone-sos-icon-inner{
  width:12px;height:12px;background:#fff;border-radius:2px;
}
.phone-sos-text{font-size:13px;color:#fff;font-weight:600;}
.phone-sos-arrow{color:#fff;font-size:18px;margin-left:auto;}
/* 手机底栏 */
.phone-bottom-nav{
  display:flex;justify-content:space-around;margin-top:auto;
  padding-top:8px;border-top:1px solid #EDE8E3;
}
.phone-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;}
.phone-nav-dot{width:18px;height:18px;border-radius:5px;background:#D5CFC8;}
.phone-nav-dot.active{background:#E8843C;}
.phone-nav-label{font-size:9px;color:#909090;}

/* 底部文字区 */
.text-section{
  position:relative;z-index:2;
  padding:50px 90px 80px;
  text-align:center;
}
.main-title{
  font-size:64px;font-weight:700;color:#2D2D2D;
  letter-spacing:4px;margin-bottom:8px;
}
.sub-title{
  font-size:28px;font-weight:600;color:#E8843C;
  letter-spacing:6px;margin-bottom:16px;
}
.desc-text{
  font-size:20px;color:#909090;font-weight:400;
  letter-spacing:3px;line-height:1.6;
}
.divider{
  width:60px;height:3px;background:linear-gradient(90deg,transparent,#E8843C,transparent);
  margin:0 auto 20px;border-radius:2px;
}

/* 底部微小装饰 */
.bottom-tag{
  position:absolute;bottom:50px;right:80px;z-index:2;
  font-size:14px;color:rgba(0,0,0,.12);letter-spacing:1px;
}
</style>
</head>
<body>
<div class="cover">

  <!-- 光晕 -->
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="glow-3"></div>

  <!-- Logo -->
  <div class="logo-area">
    <div class="logo-row">
      <div class="logo-icon">
        <img src="logo.png" alt="SunsetAI Logo">
      </div>
      <div class="logo-text-col">
        <div class="logo-name">SunsetAI</div>
        <div class="logo-sub">夕阳智语</div>
      </div>
    </div>
  </div>

  <!-- 手机模型区 -->
  <div class="phone-section">
    <!-- 淡化桌面背景 -->
    <div class="desktop-bg">
      <div class="desktop-bg-inner">
        <div class="desktop-sidebar">
          <div class="desktop-sidebar-item active"></div>
          <div class="desktop-sidebar-item"></div>
          <div class="desktop-sidebar-item"></div>
          <div class="desktop-sidebar-item"></div>
          <div class="desktop-sidebar-item"></div>
        </div>
        <div class="desktop-main">
          <div class="desktop-card">
            <div class="desktop-card-line"></div>
            <div class="desktop-card-line"></div>
          </div>
          <div class="desktop-card">
            <div class="desktop-card-line"></div>
            <div class="desktop-card-line"></div>
          </div>
          <div class="desktop-card">
            <div class="desktop-card-line"></div>
            <div class="desktop-card-line"></div>
          </div>
          <div class="desktop-card">
            <div class="desktop-card-line"></div>
            <div class="desktop-card-line"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 手机 -->
    <div class="phone-mockup">
      <div class="phone-screen">
        <div class="phone-status">
          <span class="phone-time">9:41</span>
          <div class="phone-icons">
            <div class="phone-icon-dot"></div>
            <div class="phone-icon-dot" style="opacity:.5"></div>
            <div class="phone-icon-dot" style="opacity:.3"></div>
          </div>
        </div>
        <div class="phone-header">
          <div class="phone-header-row">
            <div class="phone-avatar">明</div>
            <div>
              <div class="phone-header-title">下午好</div>
              <div class="phone-header-sub">SunsetAI · 您的健康伴侣</div>
            </div>
          </div>
        </div>
        <div class="phone-grid">
          <div class="phone-func"><div class="phone-func-icon health"></div><div class="phone-func-label">健康</div></div>
          <div class="phone-func"><div class="phone-func-icon med"></div><div class="phone-func-label">用药</div></div>
          <div class="phone-func"><div class="phone-func-icon memory"></div><div class="phone-func-label">回忆</div></div>
          <div class="phone-func"><div class="phone-func-icon diet"></div><div class="phone-func-label">饮食</div></div>
          <div class="phone-func"><div class="phone-func-icon signin"></div><div class="phone-func-label">签到</div></div>
          <div class="phone-func"><div class="phone-func-icon family"></div><div class="phone-func-label">家人</div></div>
        </div>
        <div class="phone-sos">
          <div class="phone-sos-icon"><div class="phone-sos-icon-inner"></div></div>
          <span class="phone-sos-text">紧急求助</span>
          <span class="phone-sos-arrow">&rsaquo;</span>
        </div>
        <div class="phone-bottom-nav">
          <div class="phone-nav-item"><div class="phone-nav-dot active"></div><div class="phone-nav-label">首页</div></div>
          <div class="phone-nav-item"><div class="phone-nav-dot"></div><div class="phone-nav-label">健康</div></div>
          <div class="phone-nav-item"><div class="phone-nav-dot"></div><div class="phone-nav-label">用药</div></div>
          <div class="phone-nav-item"><div class="phone-nav-dot"></div><div class="phone-nav-label">家人</div></div>
          <div class="phone-nav-item"><div class="phone-nav-dot"></div><div class="phone-nav-label">设置</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 文字 -->
  <div class="text-section">
    <div class="divider"></div>
    <div class="main-title">夕阳智语</div>
    <div class="sub-title">开发记录 · 第1期</div>
    <div class="desc-text">从基础到主链路</div>
  </div>

  <div class="bottom-tag">SunsetAI</div>

</div>
</body>
</html>
